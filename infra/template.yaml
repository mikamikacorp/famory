AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Famory – API Gateway + Lambda + S3

Parameters:
  Stage:
    Type: String
    Default: prd
  CognitoUserPoolId:
    Type: String
    Default: hogehoge

Globals:
  Function:
    Runtime: nodejs22.x
    Timeout: 30
    Architectures: [arm64]

Resources:
  # ---------- S3 ----------
  PhotosBucket:
    Type: AWS::S3::Bucket
    DependsOn: RekognitionLambdaPermission
    Properties:
      BucketName: !Sub famory-photos-${AWS::AccountId}
      CorsConfiguration:
        CorsRules:
          - AllowedMethods: [PUT]
            AllowedOrigins: ['*']
            AllowedHeaders: ['*']
            MaxAge: 3600
      LifecycleConfiguration:
        Rules:
          - Id: DeleteAfter3Days
            Status: Enabled
            ExpirationInDays: 3
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: s3:ObjectCreated:*
            Function: !GetAtt RekognitionFunction.Arn

  # ---------- API Gateway ----------
  FamoryApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref Stage
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !Sub arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${CognitoUserPoolId}
        AddDefaultAuthorizerToCorsPreflight: false
      Cors:
        AllowOrigin: "'*'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowMethods: "'OPTIONS,POST'"

  # ---------- Lambda ----------
  UploadFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambda/upload/
      Handler: index.handler
      Description: Cognito認証済みユーザー向けにS3 presigned PUT URLを発行する
      Environment:
        Variables:
          PHOTOS_BUCKET: !Ref PhotosBucket
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref PhotosBucket
      Events:
        UploadPost:
          Type: Api
          Properties:
            RestApiId: !Ref FamoryApi
            Path: /upload
            Method: POST

  RekognitionLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt RekognitionFunction.Arn
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceAccount: !Ref AWS::AccountId
      SourceArn: !Sub arn:aws:s3:::famory-photos-${AWS::AccountId}

  RekognitionFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambda/rekognition/
      Handler: index.handler
      Description: S3アップロード完了後にRekognitionコレクションを作成し顔をインデックス化する
      Environment:
        Variables:
          PHOTOS_BUCKET: !Sub 'famory-photos-${AWS::AccountId}'
      Policies:
        - S3ReadPolicy:
            BucketName: !Sub 'famory-photos-${AWS::AccountId}'
        - Statement:
            - Effect: Allow
              Action:
                - rekognition:CreateCollection
                - rekognition:IndexFaces
              Resource: !Sub arn:aws:rekognition:${AWS::Region}:${AWS::AccountId}:collection/famory-*

# ---------- Outputs ----------
Outputs:
  ApiUrl:
    Description: NEXT_PUBLIC_API_GATEWAY_URL に設定する値
    Value: !Sub https://${FamoryApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}
  PhotosBucketName:
    Value: !Ref PhotosBucket
